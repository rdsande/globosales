<script>
// Load categories into header dropdowns
async function loadHeaderCategories() {
    try {
        // Wait for StrapiAPI to be available
        if (typeof StrapiAPI === 'undefined') {
            console.log('[Header] Waiting for StrapiAPI to load...');
            setTimeout(loadHeaderCategories, 100);
            return;
        }
        
        console.log('[Header] Loading categories...');
        const categories = await StrapiAPI.getCategories();
        console.log('[Header] Categories response:', categories);
        
        if (categories.data && categories.data.length > 0) {
            console.log('[Header] Found', categories.data.length, 'categories');
            
            // Load into select dropdown
            const selectElement = document.getElementById('headerCategorySelect');
            if (selectElement) {
                console.log('[Header] Select element found, loading categories...');
                // Clear existing options except "All Categories"
                while (selectElement.options.length > 1) {
                    selectElement.remove(1);
                }
                
                categories.data.forEach(cat => {
                    const attrs = cat.attributes || cat;
                    const name = attrs.name || cat.name;
                    const slug = attrs.slug || cat.slug;
                    const option = document.createElement('option');
                    option.value = slug;
                    option.textContent = name;
                    selectElement.appendChild(option);
                });
                
                console.log('[Header] Successfully loaded', categories.data.length, 'categories into select');
                
                // Destroy and reinitialize Select2 if it exists
                if (typeof $ !== 'undefined' && typeof $.fn.select2 !== 'undefined') {
                    const $select = $(selectElement);
                    if ($select.hasClass('select2-hidden-accessible')) {
                        $select.select2('destroy');
                    }
                    $select.select2({
                        placeholder: 'All Categories',
                        allowClear: false
                    });
                    console.log('[Header] Select2 initialized');
                }
            } else {
                console.error('[Header] Select element not found!');
            }
            
            // Load into category menu
            const menuElement = document.getElementById('dynamicCategoryMenu');
            if (menuElement) {
                menuElement.innerHTML = categories.data.map(cat => {
                    const attrs = cat.attributes || cat;
                    const name = attrs.name || cat.name;
                    const slug = attrs.slug || cat.slug;
                    const icon = getCategoryIcon(name);
                    return `
                        <li class="common-dropdown__item nav-submenu__item">
                            <a href="shop.html?category=${slug}" class="common-dropdown__link nav-submenu__link hover-bg-neutral-100">
                                <span class="icon text-xl d-flex"><i class="ph ${icon}"></i></span>
                                ${name}
                            </a>
                        </li>
                    `;
                }).join('');
            }
        } else {
            console.log('[Header] No categories found in response');
        }
    } catch (error) {
        console.error('[Header] Error loading categories:', error);
    }
}

// Search autocomplete functionality
let searchTimeout;
let allProducts = [];

async function initSearchAutocomplete() {
    const searchInput = document.getElementById('headerSearchInput');
    const autocompleteDiv = document.getElementById('searchAutocomplete');
    
    if (!searchInput || !autocompleteDiv) return;
    
    // Load all products for autocomplete (cache them)
    try {
        const response = await StrapiAPI.getProducts({ pageSize: 100 });
        allProducts = response.data || [];
        console.log('[Search] Loaded', allProducts.length, 'products for autocomplete');
    } catch (error) {
        console.error('[Search] Error loading products:', error);
    }
    
    searchInput.addEventListener('input', function(e) {
        const query = e.target.value.trim();
        
        clearTimeout(searchTimeout);
        
        if (query.length < 2) {
            autocompleteDiv.classList.add('d-none');
            return;
        }
        
        searchTimeout = setTimeout(() => {
            showAutocomplete(query);
        }, 300);
    });
    
    // Hide autocomplete when clicking outside
    document.addEventListener('click', function(e) {
        if (!searchInput.contains(e.target) && !autocompleteDiv.contains(e.target)) {
            autocompleteDiv.classList.add('d-none');
        }
    });
}

function showAutocomplete(query) {
    const autocompleteDiv = document.getElementById('searchAutocomplete');
    if (!autocompleteDiv) return;
    
    const lowerQuery = query.toLowerCase();
    const matches = allProducts.filter(product => {
        const attrs = product.attributes || product;
        const title = (attrs.title || '').toLowerCase();
        const description = (attrs.description || '').toLowerCase();
        return title.includes(lowerQuery) || description.includes(lowerQuery);
    }).slice(0, 8);
    
    if (matches.length === 0) {
        autocompleteDiv.innerHTML = '<div class="p-16 text-center text-gray-500">No products found</div>';
        autocompleteDiv.classList.remove('d-none');
        return;
    }
    
    autocompleteDiv.innerHTML = matches.map(product => {
        const attrs = product.attributes || product;
        const id = product.documentId || product.id;
        const title = attrs.title || 'Untitled';
        const price = attrs.price || 0;
        const images = attrs.images?.data || [];
        const imageUrl = images.length > 0 ? StrapiAPI.getImageUrl(images[0].attributes) : 'assets/images/thumbs/product-img1.png';
        
        return `
            <a href="product-details.html?id=${id}" class="d-flex align-items-center gap-12 p-12 hover-bg-gray-50 text-decoration-none border-bottom border-gray-100">
                <img src="${imageUrl}" alt="${title}" class="w-48 h-48 object-fit-cover rounded-8">
                <div class="flex-grow-1">
                    <h6 class="text-sm mb-4 text-gray-900">${title}</h6>
                    <span class="text-main-600 fw-semibold">${StrapiAPI.formatPrice(price)}</span>
                </div>
            </a>
        `;
    }).join('');
    
    autocompleteDiv.classList.remove('d-none');
}

function getCategoryIcon(categoryName) {
    const name = categoryName.toLowerCase();
    if (name.includes('seed') || name.includes('plant')) return 'ph-plant';
    if (name.includes('fertilizer') || name.includes('soil')) return 'ph-drop';
    if (name.includes('tool') || name.includes('equipment')) return 'ph-wrench';
    if (name.includes('crop') || name.includes('grain')) return 'ph-wheat';
    if (name.includes('livestock') || name.includes('animal')) return 'ph-horse';
    if (name.includes('irrigation') || name.includes('water')) return 'ph-shower';
    if (name.includes('pesticide') || name.includes('chemical')) return 'ph-flask';
    if (name.includes('organic')) return 'ph-leaf';
    return 'ph-package';
}

// Initialize immediately - StrapiAPI is already available at this point
console.log('[Header] Script executing, StrapiAPI available:', typeof StrapiAPI !== 'undefined');
if (typeof StrapiAPI !== 'undefined') {
    loadHeaderCategories();
    initSearchAutocomplete();
} else {
    console.error('[Header] StrapiAPI not available!');
}
</script>
