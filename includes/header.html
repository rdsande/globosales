<script>
// Load categories dynamically
async function loadHeaderCategories() {
    try {
        const categories = await StrapiAPI.getCategories();
        const dropdown = document.getElementById('categoryDropdown');
        
        if (categories.data && categories.data.length > 0) {
            dropdown.innerHTML = `
                <ul class="category-list">
                    ${categories.data.map(cat => {
                        const attrs = cat.attributes || cat;
                        const name = attrs.name || cat.name;
                        const slug = attrs.slug || cat.slug;
                        const icon = getCategoryIcon(name);
                        return `
                            <li class="category-list__item">
                                <a href="shop.html?category=${slug}" class="category-list__link flex-align gap-8">
                                    <span class="icon text-xl"><i class="ph ${icon}"></i></span>
                                    <span>${name}</span>
                                </a>
                            </li>
                        `;
                    }).join('')}
                </ul>
            `;
        } else {
            dropdown.innerHTML = '<p class="text-center py-3 text-sm">No categories available</p>';
        }
    } catch (error) {
        console.error('Error loading categories:', error);
        document.getElementById('categoryDropdown').innerHTML = '<p class="text-center py-3 text-sm text-danger">Failed to load categories</p>';
    }
}

// Get appropriate icon for category
function getCategoryIcon(categoryName) {
    const name = categoryName.toLowerCase();
    if (name.includes('seed') || name.includes('plant')) return 'ph-plant';
    if (name.includes('fertilizer') || name.includes('soil')) return 'ph-drop';
    if (name.includes('tool') || name.includes('equipment')) return 'ph-wrench';
    if (name.includes('crop') || name.includes('grain')) return 'ph-wheat';
    if (name.includes('livestock') || name.includes('animal')) return 'ph-horse';
    if (name.includes('irrigation') || name.includes('water')) return 'ph-shower';
    if (name.includes('pesticide') || name.includes('chemical')) return 'ph-flask';
    if (name.includes('organic')) return 'ph-leaf';
    return 'ph-package';
}

// Load categories when DOM is ready
if (typeof StrapiAPI !== 'undefined') {
    document.addEventListener('DOMContentLoaded', loadHeaderCategories);
}
</script>
